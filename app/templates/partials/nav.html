<header class="sticky top-0 z-30 border-b border-slate-200/70 bg-white/70 backdrop-blur-md dark:border-slate-800/70 dark:bg-slate-950/70">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 sm:px-6 lg:px-8 h-16">
    <a href="/" class="flex items-center gap-2.5 group">
      <span class="grid h-9 w-9 place-items-center rounded-xl bg-gradient-to-br from-brand-700 to-[#a67c52] text-white shadow-lg shadow-brand-900/30">
        <!-- compass / GPS mark -->
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9" />
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" />
        </svg>
      </span>
      <span class="flex flex-col leading-none">
        <span class="text-base font-bold tracking-tight">Para<span class="pp-gradient-text">Pilot</span></span>
        <span class="text-[10px] font-medium uppercase tracking-wider text-slate-400 dark:text-slate-500">Illinois divorce navigator</span>
      </span>
    </a>

    <nav class="flex items-center gap-1 sm:gap-2">
      <a href="/" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-slate-100 dark:hover:bg-slate-800 {% if active == 'roadmap' %}text-brand-600 dark:text-brand-400{% else %}text-slate-600 dark:text-slate-300{% endif %}">Roadmap</a>
      <a href="/ask" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-slate-100 dark:hover:bg-slate-800 {% if active == 'ask' %}text-brand-600 dark:text-brand-400{% else %}text-slate-600 dark:text-slate-300{% endif %}">Ask</a>
      <a href="/about" class="hidden sm:inline rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-slate-100 dark:hover:bg-slate-800 {% if active == 'about' %}text-brand-600 dark:text-brand-400{% else %}text-slate-600 dark:text-slate-300{% endif %}">About</a>

      <a href="{{ find_help_url }}" target="_blank" rel="noopener"
         class="ml-1 hidden md:inline-flex items-center gap-1.5 rounded-lg bg-brand-600 px-3 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-700">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Find legal help
      </a>

      <button type="button" onclick="toggleTheme()" aria-label="Toggle dark mode"
              class="pp-focus ml-1 grid h-9 w-9 place-items-center rounded-lg text-slate-500 transition hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800">
        <svg class="h-5 w-5 dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="hidden h-5 w-5 dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </div>
</header>
