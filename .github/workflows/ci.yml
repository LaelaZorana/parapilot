name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests (offline, stub provider)
        env:
          PARAPILOT_PROVIDER: stub
        run: python -m pytest -q

      - name: Run anti-hallucination eval (offline)
        env:
          PARAPILOT_PROVIDER: stub
        run: python -m app.eval.run_eval

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t parapilot:ci .
      - name: Smoke-test the container
        run: |
          docker run -d --name parapilot -p 8000:8000 parapilot:ci
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8000/healthz; then echo "healthy"; exit 0; fi
            sleep 2
          done
          echo "container did not become healthy"; docker logs parapilot; exit 1
